<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>petit moments ｜ 生活中的随机走神</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    /* 严格复刻 Studio Mantel 的核心衬线字体与微暖背景色 */
    body { 
      background-color: #FDFDFD; 
      font-family: "Didot", "Bodoni MT", "Cinzel", "Georgia", "Noto Serif SC", serif;
      -webkit-font-smoothing: antialiased;
    }
    
    /* 隐藏详情页平铺图片的滚动条 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 优雅的黑框按钮淡入效果 */
    .inquire-btn {
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* 弹窗渐入动画 */
    .modal {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .modal.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body class="text-[#111111] antialiased">

  <header class="py-16 px-6 text-center">
    <div class="max-w-6xl mx-auto">
      <a href="#" class="text-2xl font-light uppercase tracking-[0.4em] inline-block mb-2 text-[#111111] hover:opacity-60 transition">
        petit moments
      </a>
      <p class="text-[10px] uppercase text-gray-400 tracking-[0.25em] mt-2">生活中的随机走神</p>
      
      <nav class="mt-12 flex justify-center text-xs uppercase tracking-[0.2em] text-[#111111] font-light">
        <span class="border-b border-[#111111] pb-1 cursor-pointer">Jewellery</span>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 pt-8 pb-32">
    <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-x-12 gap-y-20">
      </div>
  </main>

  <footer class="py-16 text-center text-[10px] text-gray-400 tracking-[0.2em] uppercase border-t border-gray-100">
    &copy; petit moments. curated objects.
  </footer>

  <div id="modal" class="modal fixed inset-0 bg-black/30 backdrop-blur-[1px] flex justify-center items-center z-50 p-4">
    <div class="absolute inset-0" id="modalBg"></div>
    
    <div class="bg-[#FDFDFD] rounded-none shadow-xl max-w-4xl w-full relative p-6 md:p-10 z-10 max-h-[85vh] overflow-y-auto no-scrollbar">
      <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-[#111111] text-xs font-light tracking-widest transition">&times; CLOSE</button>
      <div id="modalContent" class="mt-4"></div>
    </div>
  </div>

  <script>
    // 请确保这一行是你的 Google Sheets 公开 CSV 链接
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdeGdOivY5ATsUWSBizx2Xu5fYHnMmtFnl3_SXA0hyH1nbMzOIdrTcCEeHyoP--74hlvWBNnD36JKf/pub?gid=9534908&single=true&output=csv";

    Papa.parse(csvUrl, {
      download: true,
      header: true,
      skipEmptyLines: true,
      error: function(err) { console.error("数据加载失败:", err); },
      complete: function(results) {
        const data = results.data.filter(row => row && row.标题 && row.图片);
        const container = document.getElementById("product-container");
        container.innerHTML = ""; 

        data.forEach(item => {
          const soldOut = item.状态 && item.状态.trim() === "已售罄";
          const card = document.createElement("div");
          
          // group 用于触发鼠标悬停时内部图片的平滑放大动作
          card.className = "group flex flex-col justify-between overflow-hidden bg-transparent rounded-none shadow-none";
          
          const firstImg = item.图片 ? item.图片.split(',')[0].trim() : "";

          // 这里是精髓：完美的 3:4 竖图布局，图片无圆角。
          // 下方文字采用 flex-row justify-between，让标题在左，价格在右，完美还原 Studio Mantel。
          card.innerHTML = `
            <div class="w-full aspect-[3/4] bg-[#F5F5F3] overflow-hidden relative mb-4 rounded-none">
              <img src="${firstImg}" alt="${item.标题}" 
                   class="w-full h-full object-cover transition-transform duration-[1.5s] ease-out group-hover:scale-[1.03] ${soldOut ? 'opacity-50' : ''}" 
                   onerror="this.src='https://placehold.co/600x800/F5F5F3/888888?text=IMAGE+LOADING'"/>
            </div>
            <div class="flex justify-between items-start text-xs tracking-wide px-1">
              <h2 class="font-light text-[#111111] max-w-[70%] text-left leading-relaxed">${item.标题}</h2>
              <div class="text-right font-light pl-2 shrink-0">
                ${soldOut ? `<span class="text-red-800 italic font-normal text-[11px]">(Sold)</span>` : `<span>${item.价格 || ''}</span>`}
              </div>
            </div>
          `;

          card.addEventListener('click', () => openModal(item));
          container.appendChild(card);
        });
      }
    });

    // 弹窗逻辑
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');
    const closeModalBtn = document.getElementById('closeModal');
    const modalBg = document.getElementById('modalBg');

    function openModal(item) {
      if (!item.图片) return;
      const imgs = item.图片.split(',').map(u => u.trim());
      const soldOut = item.状态 && item.状态.trim() === "已售罄";

      // 弹窗内部同样复刻 Studio Mantel 的左右平铺大图排版
      modalContent.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 items-start">
          <div class="flex flex-col gap-6 max-h-[70vh] overflow-y-auto no-scrollbar pr-1">
            ${imgs.map(url => `
              <div class="bg-[#F5F5F3] aspect-[3/4] w-full">
                <img src="${url}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x800/F5F5F3/888888?text=IMAGE+ERROR'"/>
              </div>
            `).join('')}
          </div>
          
          <div class="flex flex-col justify-between h-full py-2">
            <div>
              <h2 class="text-lg font-light tracking-widest text-[#111111] mb-2 leading-relaxed">${item.
