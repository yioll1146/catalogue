<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>petit moments ｜ 生活中的随机走神</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    /* 严格复刻 Studio Mantel 的核心衬线字体与微暖背景色 */
    body { 
      background-color: #FDFDFD; 
      font-family: "Didot", "Bodoni MT", "Cinzel", "Georgia", "Noto Serif SC", serif;
      -webkit-font-smoothing: antialiased;
    }
    
    /* 隐藏详情页平铺图片的滚动条 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 优雅的黑框按钮过渡效果 */
    .inquire-btn { transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

    /* 弹窗渐入动画 */
    .modal {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .modal.active { opacity: 1; pointer-events: auto; }
    
    /* 多页面切换的隐藏/显示逻辑 */
    .page-content { display: none; }
    .page-content.active { display: block; }
    
    /* 导航激活状态：一条利落的底线 */
    .nav-link.active { border-bottom: 1px solid #111111; color: #111111; }
  </style>
</head>
<body class="text-[#111111] antialiased">

  <header class="py-16 px-6 text-center">
    <div class="max-w-6xl mx-auto">
      <a href="#" onclick="switchPage('jewellery')" class="text-2xl font-light uppercase tracking-[0.4em] inline-block mb-2 text-[#111111] hover:opacity-60 transition">
        petit moments
      </a>
      <p class="text-[10px] uppercase text-gray-400 tracking-[0.25em] mt-2">生活中的随机走神</p>
      
      <nav class="mt-12 flex justify-center gap-8 md:gap-12 text-xs uppercase tracking-[0.2em] text-gray-400 font-light">
        <button onclick="switchPage('jewellery')" id="nav-jewellery" class="nav-link pb-1 hover:text-[#111111] transition duration-300">Jewellery</button>
        <button onclick="switchPage('objects')" id="nav-objects" class="nav-link pb-1 hover:text-[#111111] transition duration-300">Objects</button>
        <button onclick="switchPage('archive')" id="nav-archive" class="nav-link pb-1 hover:text-[#111111] transition duration-300">Archive</button>
        <button onclick="switchPage('about')" id="nav-about" class="nav-link pb-1 hover:text-[#111111] transition duration-300">About</button>
      </nav>
    </div>
  </header>

  <main id="store-page" class="page-content active max-w-6xl mx-auto px-6 pt-8 pb-32">
    <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-x-12 gap-y-20">
      </div>
  </main>

  <main id="about-page" class="page-content max-w-2xl mx-auto px-6 pt-12 pb-32 text-center font-light">
    <div class="flex flex-col items-center">
      <h3 class="text-sm tracking-[0.2em] uppercase mb-6 text-gray-600">关于 petit moments</h3>
      <p class="text-xs tracking-[0.2em] leading-loose text-gray-500 mb-12 max-w-md">
        生活中的随机走神。<br>
        我们搜集带有时间痕迹的中古银饰、古董摆件与带有拙感的玩具。<br>
        每一件器物都是时间的孤品，静静等待下一个懂得它光泽的主人。
      </p>
      
      <div class="w-full h-[1px] bg-gray-100 my-8"></div>
      
      <h3 class="text-sm tracking-[0.2em] uppercase mb-6 text-gray-600">CONTACT & INQUIRE</h3>
      <p class="text-[10px] tracking-widest text-gray-400 mb-6 uppercase">扫码或添加微信号与我们联络</p>
      
      <div class="w-40 h-40 bg-[#F5F5F3] p-2 mb-6 border border-gray-100">
        <img src="https://placehold.co/400x400/F5F5F3/111111?text=WECHAT+QR" alt="微信二维码" class="w-full h-full object-cover">
      </div>
      
      <p class="text-sm tracking-widest text-[#111111] font-mono select-all">WeChat ID: <span class="underline font-sans">你的微信号</span></p>
      <p class="text-[10px] text-gray-400 tracking-wider mt-3 italic">添加时请备注 “网站选物”</p>
    </div>
  </main>

  <footer class="py-16 text-center text-[10px] text-gray-400 tracking-[0.2em] uppercase border-t border-gray-100">
    &copy; petit moments. curated objects.
  </footer>

  <div id="modal" class="modal fixed inset-0 bg-black/30 backdrop-blur-[1px] flex justify-center items-center z-50 p-4">
    <div class="absolute inset-0" id="modalBg"></div>
    <div class="bg-[#FDFDFD] rounded-none shadow-xl max-w-4xl w-full relative p-6 md:p-10 z-10 max-h-[85vh] overflow-y-auto no-scrollbar">
      <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-[#111111] text-xs font-light tracking-widest transition">&times; CLOSE</button>
      <div id="modalContent" class="mt-4"></div>
    </div>
  </div>

  <script>
    // ⚠️【核心】在此检查并保留你的 Google Sheets CSV 链接，确保引号后面没有换行
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdeGdOivY5ATsUWSBizx2Xu5fYHnMmtFnl3_SXA0hyH1nbMzOIdrTcCEeHyoP--74hlvWBNnD36JKf/pub?gid=9534908&single=true&output=csv";

    let globalProducts = []; 

    // 初始化：拉取并解析 CSV
    Papa.parse(csvUrl, {
      download: true,
      header: true,
      skipEmptyLines: true,
      error: function(err) { console.error("数据加载失败:", err); },
      complete: function(results) {
        // 核心安全防护：只保留带有标题和图片的有效数据行
        globalProducts = results.data.filter(row => row && row.标题 && row.图片);
        // 载入默认首页 Jewellery
        switchPage('jewellery');
      }
    });

    // 多页面路由控制器
    function switchPage(pageName) {
      // 1. 更新导航栏激活高亮线
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      const activeNav = document.getElementById(`nav-${pageName}`);
      if(activeNav) activeNav.classList.add('active');

      // 2. 页面显隐切换
      const storePage = document.getElementById('store-page');
      const aboutPage = document.getElementById('about-page');
      
      if (pageName === 'about') {
        storePage.classList.remove('active');
        aboutPage.classList.add('active');
        return; 
      } else {
        storePage.classList.add('active');
        aboutPage.classList.remove('active');
      }

      // 3. 智能多条件过滤引擎（已为你锁死精细分类关键字识别）
      let filteredData = [];
      
      if (pageName === 'jewellery') {
        // 规则：只要分类含 珠宝/银饰/项链/手链/手镯/戒指/耳环/耳钉/胸针 且 状态不是已售罄
        filteredData = globalProducts.filter(item => {
          const cate = String(item.分类 || '').trim();
          const status = String(item.状态 || '').trim();
          const isJewellery = /珠宝|银饰|jewellery|项链|手链|手镯|戒指|耳环|耳钉|胸针/i.test(cate);
          return isJewellery && status !== '已售罄';
        });
      } else if (pageName === 'objects') {
        // 规则：只要分类含 摆件/玩具/玩偶/石膏/木雕/日常/杂货 且 状态不是已售罄
        filteredData = globalProducts.filter(item => {
          const cate = String(item.分类 || '').trim();
          const status = String(item.状态 || '').trim();
          const isObjects = /摆件|玩具|玩偶|石膏|木雕|objects|日常|杂货/i.test(cate);
          return isObjects && status !== '已售罄';
        });
      } else if (pageName === 'archive') {
        // 规则：只要状态叫“已售罄”，无视分类，通通打包来这里
        filteredData = globalProducts.filter(item => String(item.状态 || '').trim() === '已售罄');
      }

      // 4. 送入画册引擎进行排版
      renderGrid(filteredData, pageName === 'archive');
    }

    // 画册排版引擎 (Studio Mantel 风格：名字居左，价格居右)
    function renderGrid(items, isArchiveView) {
      const container = document.getElementById("product-container");
      container.innerHTML = ""; 

      if(items.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-24 text-[11px] tracking-widest text-gray-400 font-light">NO PIECES AVAILABLE / 暂无该类选物</div>`;
        return;
      }

      items.forEach(item => {
        const soldOut = isArchiveView || String(item.states || item.状态 || '').trim() === "已售罄";
        const card = document.createElement("div");
        card.className = "group flex flex-col justify-between overflow-hidden bg-transparent rounded-none shadow-none";
        
        const firstImg = item.图片 ? item.图片.split(',')[0].trim() : "";

        // 💡 修改点：去掉了原先用来让售罄商品变淡的 opacity-55 滤镜，图片现在永久保持原色、原亮度。
        card.innerHTML = `
          <div class="w-full aspect-[3/4] bg-[#F5F5F3] overflow-hidden relative mb-4 rounded-none">
            <img src="${firstImg}" alt="${item.标题}" 
                 class="w-full h-full object-cover transition-transform duration-[1.5s] ease-out group-hover:scale-[1.03]" 
                 onerror="this.src='https://placehold.co/600x800/F5F5F3/888888?text=IMAGE+LOADING'"/>
          </div>
          <div class="flex justify-between items-start text-xs tracking-wide px-1">
            <h2 class="font-light text-[#111111] max-w-[70%] text-left leading-relaxed">${item.标题}</h2>
            <div class="text-right font-light pl-2 shrink-0">
              ${soldOut ? `<span class="text-red-800 italic font-normal text-[11px]">(Sold)</span>` : `<span>${item.价格 || ''}</span>`}
            </div>
          </div>
        `;

        card.addEventListener('click', () => openModal(item));
        container.appendChild(card);
      });
    }

    // 弹窗渲染逻辑
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');
    const closeModalBtn = document.getElementById('closeModal');
    const modalBg = document.getElementById('modalBg');

    function openModal(item) {
      if (!item.图片) return;
      const imgs = item.图片.split(',').map(u => u.trim());
      const soldOut = String(item.状态 || '').trim() === "已售罄";

      modalContent.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 items-start">
          <div class="flex flex-col gap-6 max-h-[70vh] overflow-y-auto no-scrollbar pr-1">
            ${imgs.map(url => `
              <div class="bg-[#F5F5F3] aspect-[3/4] w-full">
                <img src="${url}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x800/F5F5F3/888888?text=IMAGE+ERROR'"/>
              </div>
            `).join('')}
          </div>
          
          <div class="flex flex-col justify-between h-full py-2">
            <div>
              <h2 class="text-lg font-light tracking-widest text-[#111111] mb-2 leading-relaxed">${item.标题}</h2>
              <div class="text-sm font-light tracking-widest mb-8 pb-4 border-b border-gray-100">
                ${soldOut ? `<span class="text-red-800 italic">(Sold Out / 已售罄)</span>` : `<span class="text-gray-800">${item.价格 || ''}</span>`}
              </div>
              <div class="text-xs tracking-wider text-gray-500 leading-relaxed font-light whitespace-pre-line px-1">
                ${item.详情 || 'No individual details available / 暂无详细描述'}
              </div>
            </div>
            
            <div class="mt-12">
              <div onclick="${soldOut ? '' : 'switchPage(\'about\'); closeMenu();'}" class="w-full text-center border border-[#111111] py-3 text-xs tracking-widest uppercase font-light inquire-btn ${soldOut ? 'bg-gray-100 text-gray-400 border-gray-200' : 'bg-[#111111] text-white hover:bg-white hover:text-[#111111] cursor-pointer'}">
                ${soldOut ? 'PIECE SOLD OUT' : 'GET CONTACT ON ABOUT PAGE / 查看店主微信'}
              </div>
              <p class="text-[10px] text-gray-400 tracking-wider text-center mt-3 italic">Unique vintage piece. Please quote item title when inquiring.</p>
            </div>
          </div>
        </div>
      `;
      modal.classList.add('active');
    }

    const closeMenu = () => modal.classList.remove('active');
    closeModalBtn.addEventListener('click', closeMenu);
    modalBg.addEventListener('click', closeMenu);
  </script>
</body>
</html>
