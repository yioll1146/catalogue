<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>petit moments ｜ 日常生活中的随机走神</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    /* 严格复刻衬线字体，微暖背景色 */
    body { 
      background-color: #F9F6F0; 
      font-family: "Didot", "Bodoni MT", "Cinzel", "Georgia", "Noto Serif SC", serif;
      -webkit-font-smoothing: antialiased;
    }
    
    /* 隐藏详情页平铺图片的滚动条 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 优雅的黑框按钮过渡效果 */
    .inquire-btn { transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

    /* 弹窗渐入动画 */
    .modal {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .modal.active { opacity: 1; pointer-events: auto; }
    
    /* 多页面切换的隐藏/显示逻辑 */
    .page-content { display: none; }
    .page-content.active { display: block; }
    
    /* 分类导航栏激活状态，线条加粗，颜色加深 */
    .nav-link.active { border-bottom: 2px solid #000000; color: #000000; font-weight: 700; }
  </style>
</head>
<body class="text-[#000000] antialiased">

  <!-- 1. 顶部导航栏 -->
  <header class="py-16 px-6 text-center">
    <div class="max-w-6xl mx-auto">
      
      <!-- 💡【LOGO 修改区】默认是文本 LOGO，如已换成图片 LOGO，请记得重新替换此处 -->
      <a href="#" onclick="switchPage('jewellery')" class="inline-block mb-0 hover:opacity-60 transition">
  <img src="https://a1.ax1x.com/2026/05/27/YvMk.png" alt="petit moments" class="h-40 md:h-64 w-auto object-contain mx-auto">
      </a>
      
      <p class="text-xs uppercase text-gray-500 tracking-[0.25em] mt-2 font-medium">日常生活中的随机走神</p>
      
      <!-- 💡 升级：分类导航字号调小至 text-xs，字母间距 tracking-[0.25em] 拉开，分类间距大幅拉开 gap-8 md:gap-12 -->
      <nav class="mt-6 flex justify-center gap-8 md:gap-12 text-sm uppercase tracking-[0.25em] text-[#111111]/40 font-bold">
        <button onclick="switchPage('jewellery')" id="nav-jewellery" class="nav-link pb-1 text-black hover:text-[#000000] transition duration-300">Jewellery</button>
        <button onclick="switchPage('objects')" id="nav-objects" class="nav-link pb-1 text-black hover:text-[#000000] transition duration-300">Objects</button>
        <button onclick="switchPage('archive')" id="nav-archive" class="nav-link pb-1 text-black hover:text-[#000000] transition duration-300">Archive</button>
        <button onclick="switchPage('about')" id="nav-about" class="nav-link pb-1 text-black hover:text-[#000000] transition duration-300">About</button>
      </nav>
    </div>
  </header>

  <!-- ==================== 页面一、二、三：商品网格展示页 ==================== -->
  <main id="store-page" class="page-content active max-w-6xl mx-auto px-6 pt-8 pb-32">
    <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-x-12 gap-y-20">
      <!-- 货品卡片由 JavaScript 动态渲染 -->
    </div>
  </main>

  <!-- ==================== 页面四：About 独立介绍页 ==================== -->
  <main id="about-page" class="page-content max-w-2xl mx-auto px-6 pt-12 pb-32 text-center">
    <div class="flex flex-col items-center">
      <!-- 品牌故事 -->
      <h3 class="text-base font-bold tracking-[0.2em] uppercase mb-8 text-[#000000]">关于 petit moments</h3>
      <p class="text-sm font-medium tracking-widest leading-loose text-[#000000] mb-14 max-w-md">
        petit moments是生活中随机的走神时刻。<br>
        我们搜集带有时间痕迹的中古银饰、古董摆件与带有拙感的玩具。<br>
        每一件器物都是时间的孤品，静静等待下一个懂得它光泽的主人。
      </p>
      
      <div class="w-full h-[1px] bg-gray-200 my-1"></div>
      
      <!-- 微信联络信息区 -->
      <h3 class="text-base font-bold tracking-[0.2em] uppercase mb-0 text-[#000000]">CONTACT & INQUIRE</h3>
      <h3 class="text-base font-bold tracking-[0.2em] uppercase mb-14 text-[#000000]">联络 & 咨询</h3>
      <p class="text-sm font-semibold tracking-widest text-gray-500 mb-2 uppercase">添加微信号与我们联络</p>
      <p class="text-base tracking-widest uppercase text-[#000000] font-bold select-all"><span class="underline">Petitmoments</span></p>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="py-16 text-center text-[10px] text-gray-500 tracking-[0.2em] uppercase border-t border-gray-100">
    &copy; petit moments. curated objects.
  </footer>

  <!-- Studio Mantel 风格弹窗 -->
  <div id="modal" class="modal fixed inset-0 bg-black/30 backdrop-blur-[1px] flex justify-center items-center z-50 p-4">
    <div class="absolute inset-0" id="modalBg"></div>
    <div class="bg-[#F9F6F0] rounded-none shadow-xl max-w-4xl w-full relative p-6 md:p-10 z-10 max-h-[85vh] overflow-y-auto no-scrollbar">
      <button id="closeModal" class="absolute top-4 right-4 text-gray-500 hover:text-[#000000] text-xs font-bold tracking-widest transition">&times; CLOSE</button>
      <div id="modalContent" class="mt-4"></div>
    </div>
  </div>

  <script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdeGdOivY5ATsUWSBizx2Xu5fYHnMmtFnl3_SXA0hyH1nbMzOIdrTcCEeHyoP--74hlvWBNnD36JKf/pub?gid=9534908&single=true&output=csv";

    let globalProducts = []; 

    Papa.parse(csvUrl, {
      download: true,
      header: true,
      skipEmptyLines: true,
      error: function(err) { console.error("数据加载失败:", err); },
      complete: function(results) {
        globalProducts = results.data.filter(row => row && row.标题);
        switchPage('jewellery');
      }
    });

    function switchPage(pageName) {
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      const activeNav = document.getElementById(`nav-${pageName}`);
      if(activeNav) activeNav.classList.add('active');

      const storePage = document.getElementById('store-page');
      const aboutPage = document.getElementById('about-page');
      
      if (pageName === 'about') {
        storePage.classList.remove('active');
        aboutPage.classList.add('active');
        return; 
      } else {
        storePage.classList.add('active');
        aboutPage.classList.remove('active');
      }

      let filteredData = [];
      
      if (pageName === 'jewellery') {
        filteredData = globalProducts.filter(item => {
          const cate = String(item.分类 || '').trim();
          const status = String(item.states || item.状态 || '').trim();
          const isJewellery = /珠宝|银饰|jewellery|项链|手链|手镯|戒指|耳环|耳钉|胸针/i.test(cate);
          return isJewellery && status !== '已售罄';
        });
      } else if (pageName === 'objects') {
        filteredData = globalProducts.filter(item => {
          const cate = String(item.分类 || '').trim();
          const status = String(item.states || item.状态 || '').trim();
          const isObjects = /摆件|玩具|玩偶|石膏|木雕|objects|日常|杂货/i.test(cate);
          return isObjects && status !== '已售罄';
        });
      } else if (pageName === 'archive') {
        filteredData = globalProducts.filter(item => String(item.states || item.状态 || '').trim() === '已售罄');
      }

      renderGrid(filteredData, pageName === 'archive');
    }

    function renderGrid(items, isArchiveView) {
      const container = document.getElementById("product-container");
      container.innerHTML = ""; 

      if(items.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-24 text-xs tracking-widest text-gray-500 font-bold">NO PIECES AVAILABLE / 暂无该类选物</div>`;
        return;
      }

      const fallbackImg = "https://placehold.co/600x800/F5F5F3/A3A3A3?text=IMAGE+COMING+SOON";

      items.forEach(item => {
        const soldOut = isArchiveView || String(item.states || item.状态 || '').trim() === "已售罄";
        const card = document.createElement("div");
        card.className = "group flex flex-col justify-between overflow-hidden bg-transparent rounded-none shadow-none cursor-pointer";
        
        const firstImg = item.图片 && item.图片.trim() !== "" ? item.图片.split(',')[0].trim() : fallbackImg;

        card.innerHTML = `
          <div class="w-full aspect-[3/4] bg-[#F5F5F3] overflow-hidden relative mb-4 rounded-none">
            <img src="${firstImg}" alt="${item.标题}" 
                 class="w-full h-full object-cover transition-transform duration-[1.5s] ease-out group-hover:scale-[1.03]" 
                 onerror="this.src='${fallbackImg}'"/>
          </div>
          <div class="flex justify-between items-start text-sm tracking-wide px-1">
            <h2 class="font-bold text-[#000000] max-w-[70%] text-left leading-relaxed">${item.标题}</h2>
            <div class="text-right font-bold text-[#000000] pl-2 shrink-0">
              ${soldOut ? `<span class="text-red-800 italic font-bold">(Sold)</span>` : `<span>${item.价格 || ''}</span>`}
            </div>
          </div>
        `;

        card.addEventListener('click', () => openModal(item));
        container.appendChild(card);
      });
    }

    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');
    const closeModalBtn = document.getElementById('closeModal');
    const modalBg = document.getElementById('modalBg');

    function openModal(item) {
      const fallbackImg = "https://placehold.co/600x800/F5F5F3/A3A3A3?text=IMAGE+COMING+SOON";
      const imgs = item.图片 && item.图片.trim() !== "" ? item.图片.split(',').map(u => u.trim()) : [fallbackImg];
      const soldOut = String(item.states || item.状态 || '').trim() === "已售罄";

      modalContent.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 items-start">
          <div class="flex flex-col gap-6 max-h-[70vh] overflow-y-auto no-scrollbar pr-1">
            ${imgs.map(url => `
              <div class="bg-[#F5F5F3] aspect-[3/4] w-full">
                <img src="${url}" class="w-full h-full object-cover" onerror="this.src='${fallbackImg}'"/>
              </div>
            `).join('')}
          </div>
          
          <div class="flex flex-col justify-between h-full py-2">
            <div>
              <h2 class="text-xl font-bold tracking-widest text-[#000000] mb-3 leading-relaxed">${item.标题}</h2>
              <div class="text-base font-bold tracking-widest mb-8 pb-4 border-b border-gray-200 text-[#000000]">
                ${soldOut ? `<span class="text-red-800 italic">(Sold Out / 已售罄)</span>` : `<span>${item.价格 || ''}</span>`}
              </div>
              <div class="text-sm tracking-wider text-black leading-loose font-medium whitespace-pre-line px-1">
                ${item.详情 || 'No individual details available / 暂无详细描述'}
              </div>
            </div>
            
            <div class="mt-12">
              <div onclick="${soldOut ? '' : 'switchPage(\'about\'); closeMenu();'}" class="w-full text-center border-2 border-[#000000] py-3.5 text-xs tracking-widest uppercase font-bold inquire-btn ${soldOut ? 'bg-gray-100 text-gray-400 border-gray-200' : 'bg-[#000000] text-white hover:bg-white hover:text-[#000000] cursor-pointer'}">
                ${soldOut ? 'PIECE SOLD OUT' : 'GET CONTACT ON ABOUT PAGE / 查看店主微信'}
              </div>
              <p class="text-[10px] text-gray-500 tracking-wider text-center mt-3 font-semibold italic">Unique vintage piece. Please quote item title when inquiring.</p>
            </div>
          </div>
        </div>
      `;
      modal.classList.add('active');
    }

    const closeMenu = () => modal.classList.remove('active');
    closeModalBtn.addEventListener('click', closeMenu);
    modalBg.addEventListener('click', closeMenu);
  </script>
</body>
</html>
