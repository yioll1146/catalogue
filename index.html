<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>petit moments ｜ 生活中的随机走神</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    /* 复刻 Studio Mantel 的核心衬线字体与优雅背景 */
    body { 
      background-color: #FBFBFA; /* 带着极淡淡暖调的白，比纯白更有复古纸张质感 */
      font-family: "Didot", "Bodoni MT", "Cinzel", "Georgia", "Noto Serif SC", serif;
      -webkit-font-smoothing: antialiased;
    }
    
    /* 隐藏滚动条但保留滚动功能（用于详情页多图） */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 优雅的弹窗渐入动画 */
    .modal {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .modal.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body class="text-[#222222] antialiased">

  <header class="border-b border-[#EAEAE8] py-10 px-6 tracking-widest text-center">
    <div class="max-w-6xl mx-auto">
      <a href="#" class="text-2xl font-light uppercase tracking-[0.3em] inline-block mb-3 hover:opacity-70 transition">
        petit moments
      </a>
      <div class="h-[1px] w-12 bg-[#222222] mx-auto my-4"></div>
      <p class="text-xs uppercase text-gray-400 tracking-[0.2em]">生活中的随机走神</p>
      
      <nav class="mt-8 flex justify-center gap-8 text-xs uppercase text-gray-500 tracking-wider">
        <span class="text-[#222222] border-b border-[#222222] pb-1">Jewellery / </span>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 pt-16 pb-32">
    <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-x-10 gap-y-20">
      </div>
  </main>

  <footer class="border-t border-[#EAEAE8] py-12 text-center text-xs text-gray-400 tracking-widest uppercase">
    &copy; petit moments. All unique pieces.
  </footer>

  <div id="modal" class="modal fixed inset-0 bg-black/40 backdrop-blur-[2px] flex justify-center align-middle items-center z-50 p-4">
    <div class="absolute inset-0" id="modalBg"></div>
    
    <div class="bg-[#FBFBFA] rounded-none shadow-2xl max-w-3xl w-full relative p-8 md:p-12 z-10 max-h-[90vh] overflow-y-auto no-scrollbar">
      <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-[#222222] text-xl font-light transition tracking-widest">&times; CLOSE</button>
      <div id="modalContent" class="mt-4"></div>
    </div>
  </div>

  <script>
    // ⚠️【请确保这一行换成你真实的 Google Sheets 公开 CSV 链接】
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdeGdOivY5ATsUWSBizx2Xu5fYHnMmtFnl3_SXA0hyH1nbMzOIdrTcCEeHyoP--74hlvWBNnD36JKf/pub?gid=9534908&single=true&output=csv";

    // 解析 CSV 并在页面渲染
    Papa.parse(csvUrl, {
      download: true,
      header: true,
      skipEmptyLines: true,
      error: function(err) {
        console.error("数据加载失败:", err);
      },
      complete: function(results) {
        const data = results.data.filter(row => row && row.标题 && row.图片);
        const container = document.getElementById("product-container");
        container.innerHTML = ""; 

        data.forEach(item => {
          const soldOut = item.状态 && item.状态.trim() === "已售罄";
          const card = document.createElement("div");
          // 去除所有圆角和投影，改为完全平面的高级画册感
          card.className = "group relative cursor-pointer flex flex-col justify-between overflow-hidden";
          
          const firstImg = item.图片 ? item.图片.split(',')[0].trim() : "";

          card.innerHTML = `
            <div class="w-full aspect-[4/5] bg-[#F2F2F0] overflow-hidden relative mb-4">
              <img src="${firstImg}" alt="${item.标题}" 
                   class="w-full h-full object-cover transition-transform duration-[1.2s] cubic-bezier(0.25, 0.46, 0.45, 0.94) group-hover:scale-105 ${soldOut ? 'opacity-60' : ''}" 
                   onerror="this.src='https://placehold.co/600x750/F2F2F0/888888?text=IMAGE+LOADING'"/>
            </div>
            <div class="flex flex-col items-center text-center">
              <h2 class="text-sm font-light tracking-wide text-[#222222] mb-1 group-hover:text-gray-500 transition-colors duration-300 px-2 line-clamp-2">${item.标题}</h2>
              <div class="text-xs tracking-widest text-gray-500 font-light">
                ${soldOut ? `<span class="text-gray-300 line-through mr-1">${item.价格 || ''}</span> <span class="text-red-800 italic font-normal">(Sold)</span>` : `<span>${item.价格 || ''}</span>`}
              </div>
            </div>
          `;

          card.addEventListener('click', () => openModal(item));
          container.appendChild(card);
        });
      }
    });

    // 弹窗逻辑
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');
    const closeModalBtn = document.getElementById('closeModal');
    const modalBg = document.getElementById('modalBg');

    function openModal(item) {
      if (!item.图片) return;
      const imgs = item.图片.split(',').map(u => u.trim());
      const soldOut = item.状态 && item.状态.trim() === "已售罄";

      modalContent.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
          <div class="flex flex-col gap-4 max-h-[60vh] overflow-y-auto no-scrollbar pr-1">
            ${imgs.map(url => `
              <div class="bg-[#F2F2F0] aspect-[4/5] w-full">
                <img src="${url}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x750/F2F2F0/888888?text=IMAGE+ERROR'"/>
              </div>
            `).join('')}
          </div>
          
          <div class="flex flex-col justify-between h-full py-2">
            <div>
              <h2 class="text-xl font-light tracking-widest text-[#222222] mb-4 leading-relaxed">${item.标题}</h2>
              <div class="text-md font-light tracking-widest mb-6 pb-4 border-b border-[#EAEAE8]">
                ${soldOut ? `<span class="text-gray-300 line-through">${item.价格 || ''}</span> <span class="text-red-800 ml-2 italic text-sm">(Sold Out / 已售罄)</span>` : `<span class="text-gray-800">${item.价格 || ''}</span>`}
              </div>
              <div class="text-xs tracking-wider text-gray-500 leading-relaxed font-light whitespace-pre-line bg-[#F5F5F3] p-4">
                ${item.详情 || 'No further description available / 暂无详细描述'}
              </div>
            </div>

            <div class="mt-8">
              <div class="w-full text-center border border-[#222222] py-3 text-xs tracking-widest uppercase font-light bg-[#222222] text-white">
                ${soldOut ? 'PIECE SOLD OUT / 已售罄' : 'INQUIRE VIA WECHAT / 微信咨询购买'}
              </div>
              <p class="text-[11px] text-gray-400 tracking-wider text-center mt-2 italic">中古商品独一无二，请截图联系微信确认细节</p>
            </div>
          </div>
        </div>
      `;
      modal.classList.add('
